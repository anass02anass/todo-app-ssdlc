name: CI — Build, Test & SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-sast:
    name: Pruebas unitarias + Análisis estático
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependencias
        working-directory: app
        run: npm ci

      # SAST: Análisis de vulnerabilidades en dependencias
      - name: npm audit (SAST — dependencias)
        working-directory: app
        run: npm audit --audit-level=high

      # SAST: Análisis estático con ESLint + plugin de seguridad
      - name: ESLint con reglas de seguridad
        working-directory: app
        run: npm run lint

      # Pruebas unitarias (incluyen casos de seguridad)
      - name: Ejecutar pruebas unitarias
        working-directory: app
        run: npm test
        env:
          NODE_ENV: test
          SESSION_SECRET: ci-test-secret-placeholder
          DB_PATH: /tmp/test-ci.db
