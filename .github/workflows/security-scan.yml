name: Security Scan — Trivy + OWASP ZAP

on:
  push:
    branches: [main]
  schedule:
    # Ejecutar semanalmente los lunes a las 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  trivy-image-scan:
    name: Análisis de imagen Docker (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t todo-app-ssdlc:${{ github.sha }} .

      - name: Escanear imagen con Trivy (CVEs críticos y altos)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: todo-app-ssdlc:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  zap-dast-scan:
    name: DAST — OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: trivy-image-scan  # Solo si la imagen pasa el análisis de Trivy

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Iniciar la aplicación
        run: |
          cp .env.example .env
          sed -i 's/CAMBIA_ESTE_VALOR_POR_UNO_ALEATORIO_SEGURO/ci-zap-secret-placeholder/' .env
          docker compose up -d
          sleep 10  # Esperar a que la app esté lista

      - name: Ejecutar OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: 'tests/security/zap-baseline.conf'
          fail_action: true

      - name: Detener la aplicación
        if: always()
        run: docker compose down -v
