<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP via meta tag (refuerzo; la cabecera HTTP de helmet tiene precedencia) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <title>Todo App — S-SDLC</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    input { padding: .5rem; width: 70%; }
    button { padding: .5rem 1rem; cursor: pointer; }
    li { display: flex; gap: .5rem; align-items: center; margin: .5rem 0; }
    .done { text-decoration: line-through; color: #888; }
  </style>
</head>
<body>
  <h1>Lista de tareas</h1>
  <form id="form">
    <input id="input" type="text" placeholder="Nueva tarea..." maxlength="255" required>
    <button type="submit">Añadir</button>
  </form>
  <ul id="list"></ul>

  <script src="/app.js"></script>
</body>
</html>
